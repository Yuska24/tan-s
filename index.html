<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salam, Xumar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; width: 100%; background: #0a0a12; font-family: 'Jost', sans-serif; overflow-x: hidden; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100svh; position: relative; }
  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .orb { position:fixed; border-radius:50%; filter:blur(70px); pointer-events:none; opacity:0; animation: orbIn 2s ease forwards; z-index:0; }
  .orb-1 { width:260px; height:260px; background:radial-gradient(circle,#b388ff44,transparent); top:-60px; left:-60px; animation-delay:.2s; }
  .orb-2 { width:220px; height:220px; background:radial-gradient(circle,#f4898944,transparent); bottom:-40px; right:-40px; animation-delay:.5s; }
  @keyframes orbIn { to { opacity:1; } }
  .container { position: relative; z-index:10; text-align: center; padding: 3rem 1.5rem 2rem; width: 100%; max-width: 420px; }
  .eyebrow { font-weight:200; font-size:10px; letter-spacing:4px; text-transform:uppercase; color:#b388ff88; margin-bottom:1.4rem; opacity:0; animation: riseIn .8s ease .5s forwards; }
  .main-text { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2.3rem; color:#f5f0ff; line-height:1.2; margin-bottom:.3rem; opacity:0; animation: riseIn 1s ease .8s forwards; }
  .main-text em { font-style:italic; color:#e2b4ff; }
  .name-highlight { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:2.6rem; color:#e2b4ff; display:block; margin-bottom:.4rem; opacity:0; animation: riseIn 1s ease 1s forwards; text-shadow: 0 0 40px #b388ff33; }
  .sub-line { font-weight:200; font-size:11px; color:#ffffff33; letter-spacing:1.2px; margin-bottom:1.8rem; opacity:0; animation: riseIn 1s ease 1.1s forwards; line-height:1.6; }
  .divider { width:36px; height:.5px; background:linear-gradient(90deg,transparent,#b388ff77,transparent); margin:0 auto 1.8rem; opacity:0; animation: fadeIn 1s ease 1.3s forwards; }
  .question { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.55rem; color:#f5f0ff; margin-bottom:1.8rem; opacity:0; animation: riseIn 1s ease 1.5s forwards; }
  .choices { display: flex; flex-direction: column; gap: 10px; opacity:0; animation: riseIn 1s ease 1.9s forwards; }
  .choice-btn { background: transparent; border: 0.5px solid #b388ff2e; border-radius: 16px; padding: 15px 18px; cursor: pointer; transition: all .25s ease; display: flex; align-items: center; gap: 14px; color: #f5f0ff; text-align: left; font-family: 'Jost', sans-serif; width: 100%; }
  .choice-btn:active { transform: scale(0.97); opacity: .85; }
  .choice-btn.yes-btn:active { background: #c084fc18; border-color: #c084fc88; }
  .choice-btn.maybe-btn:active { background: #80cbc418; border-color: #80cbc466; }
  .choice-btn.playful-btn:active { background: #ffd70018; border-color: #ffd70066; }

  /* Qaçan no düyməsi */
  .no-wrapper { position: relative; height: 54px; margin-top: 2px; }
  .choice-btn.no-btn { position: absolute; left: 0; top: 0; width: 100%; border: 0.5px solid #f4898922; transition: left .15s ease, top .15s ease; }
  .choice-btn.no-btn.escaped { border-color: #f4898955; }

  .emoji-big { font-size: 1.6rem; min-width: 2.2rem; text-align:center; }
  .choice-text { flex:1; }
  .choice-label { font-size: 14px; font-weight: 300; letter-spacing:.3px; color: #f5f0ffdd; display: block; margin-bottom: 3px; }
  .choice-sub { font-size: 11.5px; font-weight: 200; color: #ffffff3a; display: block; line-height:1.4; }

  .response-area { display: none; flex-direction: column; align-items: center; gap: 1.1rem; text-align: center; padding: 1rem 0; }
  .response-emoji { font-size: 3rem; animation: popIn .5s ease forwards; }
  .response-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.75rem; color:#e2b4ff; line-height:1.3; animation: riseIn .6s ease .1s both; }
  .response-sub { font-size: 12px; font-weight:200; color:#ffffff44; letter-spacing:.8px; animation: riseIn .6s ease .3s both; line-height:1.6; }
  .back-btn { margin-top:.3rem; background: transparent; border: 0.5px solid #ffffff1a; border-radius: 50px; padding: 10px 24px; color: #ffffff2a; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:1.5px; cursor:pointer; transition: all .25s; animation: riseIn .6s ease .5s both; }
  .back-btn:active { color:#ffffff66; border-color:#ffffff44; }

  /* Konfetti */
  .confetti-piece { position:fixed; pointer-events:none; z-index:999; animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
  }

  .footer-wrap { margin-top: 2rem; opacity:0; animation: riseIn 1s ease 2.3s forwards; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .footer-note { font-size:10px; color:#ffffff; font-weight:200; letter-spacing:1px; }
  .made-by { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: #b388ff44; letter-spacing: 1.5px; }

  @keyframes riseIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { to{opacity:1} }
  @keyframes popIn { 0%{transform:scale(.5);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="stars"></canvas>
<div class="container">
  <div id="mainView">
    <p class="eyebrow">salam, bir sualım var</p>
    <h1 class="main-text">gözlənilmədən<br>bir nəfəri <em>tanımaq</em><br>istərdin mi?</h1>
    <div class="divider"></div>
    <p class="question">tanış olaq?</p>
    <div class="choices">
      <button class="choice-btn yes-btn" onclick="respond('yes')">
        <span class="emoji-big">🌙</span>
        <span class="choice-text">
          <span class="choice-label">bu emojini göndər</span>
          <span class="choice-sub">bəli, niyə olmasın</span>
        </span>
      </button>
      <button class="choice-btn playful-btn" onclick="respond('curious')">
        <span class="emoji-big">🎲</span>
        <span class="choice-text">
          <span class="choice-label">bu emojini göndər</span>
          <span class="choice-sub">maraqlıdır, amma əvvəlcə bir sual soruşacağam</span>
        </span>
      </button>
      <button class="choice-btn maybe-btn" onclick="respond('maybe')">
        <span class="emoji-big">❓</span>
        <span class="choice-text">
          <span class="choice-label">bu emojini göndər</span>
          <span class="choice-sub">bəlkə... indi tam bilmirəm ki</span>
        </span>
      </button>

      <!-- Qaçan düymə -->
      <div class="no-wrapper" id="noWrapper">
        <button class="choice-btn no-btn" id="noBtn"
          onmouseenter="escapeBtn(event)"
          ontouchstart="escapeBtn(event)"
          onclick="respond('no')">
          <span class="emoji-big">❌</span>
          <span class="choice-text">
            <span class="choice-label">bu emojini göndər</span>
            <span class="choice-sub">yox, amma bunu göndərirəm sadəcə</span>
          </span>
        </button>
      </div>
    </div>
  </div>

  <div class="response-area" id="responseArea">
    <div class="response-emoji" id="respEmoji"></div>
    <p class="response-title" id="respTitle"></p>
    <p class="response-sub" id="respSub"></p>
    <button class="back-btn" onclick="goBack()">← geri qayıt</button>
  </div>

  <div class="footer-wrap">
    <p class="footer-note">bu səhifə yalnız Xumar üçün yaradıldı</p>
    <p class="made-by">Made by Yusif</p>
  </div>
</div>

<script>
const responses = {
  yes:     { emoji:'🌙✨', title:'gözəl seçim, Xumar. gözləyirəm.', sub:'bu emojini göndər, danışaq' },
  curious: { emoji:'🎲',   title:'sual ver, cavab verim.',           sub:'bu emojini göndər, oyun başlasın' },
  maybe:   { emoji:'❓',   title:'məncə bir daha düşün.',   sub:'arxaya gedib bir daha yoxla' },
  no:      { emoji:'❌',   title:'tamam, başa düşdüm.',              sub:'Məncə bu o qədər də yaxşı bir emoji deyil' }
};

// ---- Qaçan düymə ----
let escapeCount = 0;

function escapeBtn(e) {
  if (escapeCount >= 5) return;
  e.preventDefault();
  const btn = document.getElementById('noBtn');
  const container = document.querySelector('.container');
  const cRect = container.getBoundingClientRect();
  const wRect = document.getElementById('noWrapper').getBoundingClientRect();
  const maxX = cRect.width - btn.offsetWidth;
  const maxY = cRect.height - btn.offsetHeight - 20;
  btn.style.position = 'fixed';
  btn.style.width = wRect.width + 'px';
  btn.style.left = (cRect.left + Math.random() * maxX) + 'px';
  btn.style.top  = (cRect.top  + Math.random() * maxY) + 'px';
  btn.style.zIndex = 50;
  btn.classList.add('escaped');
  escapeCount++;
}

// ---- Respond ----
function respond(type) {
  if (type === 'yes' || type === 'curious') launchConfetti();
  setTimeout(() => {
    const r = responses[type];
    document.getElementById('respEmoji').textContent = r.emoji;
    document.getElementById('respTitle').textContent = r.title;
    document.getElementById('respSub').textContent   = r.sub;
    document.getElementById('mainView').style.display    = 'none';
    document.getElementById('responseArea').style.display = 'flex';
  }, (type === 'yes' || type === 'curious') ? 600 : 0);
}

function goBack() {
  const btn = document.getElementById('noBtn');
  btn.style.position = 'absolute';
  btn.style.left = '0'; btn.style.top = '0'; btn.style.width = '100%';
  btn.classList.remove('escaped');
  escapeCount = 0;
  document.getElementById('mainView').style.display     = 'block';
  document.getElementById('responseArea').style.display = 'none';
}

// ---- Konfetti ----
function launchConfetti() {
  const colors = ['#e2b4ff','#c084fc','#f4b8ea','#ffd6f0','#b388ff','#ffffff','#fbbf24'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left   = Math.random() * 100 + 'vw';
      el.style.top    = '-10px';
      el.style.background   = colors[Math.floor(Math.random() * colors.length)];
      el.style.width  = (6 + Math.random() * 6) + 'px';
      el.style.height = (6 + Math.random() * 6) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 20);
  }
}

// ---- Ulduzlar ----
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = Array.from({length:80}, () => ({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1+.2,
    phase:Math.random()*Math.PI*2,
    speed:Math.random()*.004+.002
  }));
}
function draw(t) {
  ctx.clearRect(0,0,W,H);
  stars.forEach(s => {
    const a = .12+.5*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,180,255,${a})`; ctx.fill();
  });
  requestAnimationFrame(draw);
}
resize(); window.addEventListener('resize',resize); requestAnimationFrame(draw);
</script>
</body>
</html>
